# GitHub Pages config — serves the project landing page from /docs on main.
# Settings → Pages → Source: "Deploy from a branch" → branch: main, folder: /docs
title: Agent-in-the-Loop Forecasting
description: >-
  A bounded LLM agent that diagnoses time-series failure modes, proposes
  interventions, and validates them via backtesting. It does not forecast.
theme: jekyll-theme-cayman
show_downloads: false

# Exclude repo artifacts that happen to live under docs/ from the rendered site.
exclude:
  - "*.pdf"
  - decisions/
